<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Aperçu téléphone — menu bêta DNB</title>
<style>
html,body{margin:0;min-height:100%;background:#dfe5ec;font-family:system-ui,sans-serif}
body{display:grid;place-items:start center;padding:20px}
.phone{width:390px;height:844px;border:1px solid #9aa9ba;border-radius:24px;overflow:hidden;background:#fff;box-shadow:0 18px 50px rgba(16,41,74,.22)}
iframe{display:block;width:390px;height:844px;border:0}
</style>
</head>
<body>
<div class="phone"><iframe id="phoneFrame" title="Menu bêta téléphone" src="../auto/"></iframe></div>
<script>
phoneFrame.addEventListener('load',()=>{
  const style=phoneFrame.contentDocument.createElement('style');
  style.textContent='html{scrollbar-width:none}::-webkit-scrollbar{display:none}';
  phoneFrame.contentDocument.head.append(style);
});
</script>
</body>
</html>
